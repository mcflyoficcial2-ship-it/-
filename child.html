<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренировка</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="card">
  <div class="avatar" id="avatar">🤖</div>
  <h2>Тренировка устного счёта</h2>

  <div id="task">Нажми старт</div>
  <input type="number" id="answer" placeholder="Ваш ответ">
  <div id="hint"></div>

  <button id="startBtn">Старт</button>
  <button id="checkBtn" style="display:none;">Проверить</button>
  <button id="stopBtn" style="display:none;">Стоп</button>
  <button id="hintBtn" style="display:none;">Подсказка</button>

  <h3>Прогресс</h3>
  <div class="progress-bar"><div id="xpBar"></div></div>
  XP: <span id="xp">0</span> | Серия: <span id="streak">0</span> | Уровень: <span id="playerLevel">1</span>

  <h3>AI говорит</h3>
  <div id="aiText"></div>

  <h3>Достижения</h3>
  <div id="achievements"></div>

  <h3>Статистика</h3>
  Всего: <span id="total">0</span> | Правильно: <span id="correct">0</span> | Неправильно: <span id="wrong">0</span> | Точность: <span id="accuracy">0%</span> | Лучшая серия: <span id="bestStreak">0</span>

  <canvas id="progressChart" style="margin-top:15px;"></canvas>
  <button onclick="resetProgress()">Сбросить прогресс</button>
  <br><br>
  <button onclick="location.href='index.html'">Назад</button>
</div>

<script src="script.js"></script>
<script>
document.getElementById("hintBtn").onclick = () => showHint();
document.getElementById("stopBtn").onclick = () => {
  document.getElementById("checkBtn").style.display="none";
  document.getElementById("stopBtn").style.display="none";
  document.getElementById("startBtn").style.display="block";
  el("task").textContent="Нажми старт";
}
</script>
</body>
</html>
