\<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренировка</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <div class="avatar" id="avatar">🤖</div>
  <h2>Тренировка устного счёта</h2>

  <div id="task">Нажми старт</div>
  <input type="number" id="answer" placeholder="Ваш ответ">
  <div id="hint"></div>

  <button id="startBtn">Старт</button>
  <button id="checkBtn" style="display:none;">Проверить</button>
  <button id="hintBtn" style="display:none;">Подсказка</button>
  <button id="stopBtn" style="display:none;">Стоп</button>

  <h3>Прогресс</h3>
  <div class="progress-bar"><div id="xpBar"></div></div>
  XP: <span id="xp">0</span> | Серия: <span id="streak">0</span> | Уровень: <span id="playerLevel">1</span>

  <h3>AI говорит</h3>
  <div id="aiText">Привет! Нажми старт, чтобы начать.</div>

  <h3>Достижения</h3>
  <div id="achievements"></div>

  <br><br>
  <button onclick="location.href='index.html'">Назад</button>
</div>

<script>
// ====== Утилиты ======
function el(id){ return document.getElementById(id); }
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

// ====== Данные ======
let data = JSON.parse(localStorage.getItem("mathData")) || {
  total:0, correct:0, wrong:0, streak:0, bestStreak:0,
  xp:0, level:1, difficulty:1, correctStreak:0, wrongStreak:0, history:[]
};

let currentAnswer = 0;

// ====== Сохранение ======
function save(){ localStorage.setItem("mathData", JSON.stringify(data)); }
function saveHistory(){ /* можно добавлять историю если нужно */ }

// ====== AI ======
function aiMood(type){
  const avatar = el("avatar");
  if(!avatar) return;
  avatar.textContent = type==="correct"?"😄":"🤔";
}

// ====== Генерация примера ======
function generate(){
  let a,b,op;
  let d = data.difficulty;

  if(d===1){ a=rand(1,9); b=rand(1,9); op="+"; }
  else if(d===2){ a=rand(10,99); op=Math.random()<0.6?"-":"+"; b=op==="-"?Math.floor(rand(1,9))*10+9:rand(10,99); }
  else if(d===3){ a=rand(100,999); b=rand(10,99); op=Math.random()<0.5?"+":"-"; }
  else if(d===4){ a=rand(2,9); b=rand(2,9); op=Math.random()<0.5?"×":"÷"; }
  else { a=rand(10,50); b=rand(2,10); op=Math.random()<0.5?"×":"÷"; }

  if(op=="+") currentAnswer=a+b;
  if(op=="-") currentAnswer=a-b;
  if(op=="×") currentAnswer=a*b;
  if(op=="÷"){ currentAnswer=a; a=a*b; }

  if(el("task")) el("task").textContent=`${a} ${op} ${b}`;
}

// ====== Подсказка ======
function showHint(){
  const taskEl = el("task");
  if(!taskEl) return;
  let taskText=taskEl.textContent;
  let hint="";
  if(taskText.includes("-")) hint="💡 Попробуй сначала округлить число, потом вычесть.";
  else if(taskText.includes("+")) hint="💡 Сложи сначала десятки, потом единицы.";
  else if(taskText.includes("×")) hint="💡 Умножай по частям.";
  else if(taskText.includes("÷")) hint="💡 Подумай, какое число умножить, чтобы получить это.";
  const hintEl=el("hint");
  if(hintEl) hintEl.textContent=hint;
}

// ====== Адаптивная сложность ======
function updateDifficulty(correct){
  if(correct){ data.correctStreak++; data.wrongStreak=0; }
  else { data.wrongStreak++; data.correctStreak=0; }

  if(data.correctStreak>=3 && data.difficulty<5){ data.difficulty++; data.correctStreak=0; if(el("aiText")) el("aiText").textContent="AI повышает уровень сложности"; }
  if(data.wrongStreak>=2 && data.difficulty>1){ data.difficulty--; data.wrongStreak=0; if(el("aiText")) el("aiText").textContent="AI немного упростил задания"; }
}

// ====== Уровень ======
function checkLevel(){
  if(data.xp >= data.level*100){ data.level++; if(el("aiText")) el("aiText").textContent="Новый уровень!"; }
}

// ====== Достижения ======
function checkAchievements(){ /* сюда можно добавить реализацию достижений */ }

// ====== UI ======
function updateUI(){
  if(el("xp")) el("xp").textContent=data.xp;
  if(el("streak")) el("streak").textContent=data.streak;
  if(el("playerLevel")) el("playerLevel").textContent=data.level;
}

// ====== DOM и кнопки ======
document.addEventListener("DOMContentLoaded", ()=>{
  const startBtn=el("startBtn"), checkBtn=el("checkBtn"), hintBtn=el("hintBtn"), stopBtn=el("stopBtn");

  if(startBtn) startBtn.onclick=()=>{
    generate();
    startBtn.style.display="none";
    if(checkBtn) checkBtn.style.display="inline-block";
    if(hintBtn) hintBtn.style.display="inline-block";
    if(stopBtn) stopBtn.style.display="inline-block";
    if(el("aiText")) el("aiText").textContent="🚀 Давай начнём!";
  }

  if(checkBtn) checkBtn.onclick=()=>{
    const answerEl=el("answer"); if(!answerEl) return;
    const val=answerEl.value.trim(); if(val==="") return;
    const num=Number(val);
    data.total++; saveHistory();
    const isCorrect=num===currentAnswer;
    if(isCorrect){
      data.correct++; data.streak++; data.xp+=10;
      if(data.streak>data.bestStreak) data.bestStreak=data.streak;
      aiMood("correct");
      const good=["😄 Отлично!","🔥 Круто!","💪 Так держать!","👏 Молодец!"];
      if(el("aiText")) el("aiText").textContent=good[Math.floor(Math.random()*good.length)];
    } else {
      data.wrong++; data.streak=0; aiMood("wrong");
      const bad=["🤔 Попробуй ещё","💡 Подумай","😅 Почти!","Не сдавайся!"];
      if(el("aiText")) el("aiText").textContent=bad[Math.floor(Math.random()*bad.length)];
      showHint();
    }
    if(typeof updateDifficulty==="function") updateDifficulty(isCorrect);
    checkLevel(); checkAchievements(); save(); updateUI();
    answerEl.value=""; generate();
  }

  if(hintBtn) hintBtn.onclick=()=>showHint();

  if(stopBtn) stopBtn.onclick=()=>{
    if(checkBtn) checkBtn.style.display="none";
    if(hintBtn) hintBtn.style.display="none";
    stopBtn.style.display="none";
    if(startBtn) startBtn.style.display="inline-block";
    if(el("task")) el("task").textContent="Нажми старт";
    if(el("hint")) el("hint").textContent="";
    if(el("aiText")) el("aiText").textContent="Остановились. Можно начать заново.";
  }

});
</script>
