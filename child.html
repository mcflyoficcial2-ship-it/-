<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренировка устного счёта</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <div class="avatar" id="avatar">🤖</div>
  <h2>Тренировка устного счёта</h2>

  <div id="task">Нажми старт</div>
  <input type="number" id="answer" placeholder="Ваш ответ">
  <div id="hint"></div>

  <button id="startBtn">Старт</button>
  <button id="checkBtn" style="display:none;">Проверить</button>
  <button id="hintBtn" style="display:none;">Подсказка</button>
  <button id="stopBtn" style="display:none;">Стоп</button>

  <h3>Прогресс</h3>
  <div class="progress-bar"><div id="xpBar"></div></div>
  XP: <span id="xp">0</span> | Серия: <span id="streak">0</span> | Уровень: <span id="playerLevel">1</span>

  <h3>AI говорит</h3>
  <div id="aiText">Привет! Нажми старт, чтобы начать.</div>

  <br><br>
  <button onclick="location.href='index.html'">Назад</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", ()=>{
  const el = id => document.getElementById(id);
  const rand = (min,max)=>Math.floor(Math.random()*(max-min+1))+min;

  let data = JSON.parse(localStorage.getItem("mathData")) || {
    total:0, correct:0, wrong:0, streak:0, bestStreak:0,
    xp:0, level:1, difficulty:1, correctStreak:0, wrongStreak:0
  };

  let currentAnswer = 0;

  function save(){ localStorage.setItem("mathData", JSON.stringify(data)); }
  function aiMood(type){ if(el("avatar")) el("avatar").textContent = type==="correct"?"😄":"🤔"; }

  function generate(){
    let a,b,op;
    switch(data.difficulty){
      case 1: a=rand(1,3); b=rand(1,3); break;
      case 2: a=rand(1,5); b=rand(1,5); break;
      case 3: a=rand(6,9); b=rand(1,9); break;
      case 4: a=rand(10,49); b=rand(1,49); break;
      case 5: a=rand(50,99); b=rand(10,99); break;
      default: a=rand(100,499); b=rand(50,499);
    }
    op = Math.random()<0.5?"+":"-";
    currentAnswer = op==="+"?a+b:a-b;
    el("task").textContent = `${a} ${op} ${b}`;
    el("hint").textContent = "";
  }

  function showHint(){
    let t = el("task").textContent;
    let hint = t.includes("-")?"💡 Сначала округли, потом вычти":"💡 Сначала десятки, потом единицы";
    el("hint").textContent = hint;
  }

  function updateDifficulty(correct){
    if(correct){ data.correctStreak++; data.wrongStreak=0; }
    else { data.wrongStreak++; data.correctStreak=0; }

    if(data.correctStreak>=3 && data.difficulty<6){ 
      data.difficulty++; data.correctStreak=0; 
      el("aiText").textContent="AI повышает сложность 🚀"; 
    }
    if(data.wrongStreak>=2 && data.difficulty>1){ 
      data.difficulty--; data.wrongStreak=0; 
      el("aiText").textContent="AI упрощает задания ⚡"; 
    }
  }

  function checkLevel(){
    if(data.xp>=data.level*100){ data.level++; el("aiText").textContent="🎉 Новый уровень!"; }
  }

  function updateUI(){
    el("xp").textContent = data.xp;
    el("streak").textContent = data.streak;
    el("playerLevel").textContent = data.level;
  }

  const startBtn = el("startBtn");
  const checkBtn = el("checkBtn");
  const hintBtn = el("hintBtn");
  const stopBtn = el("stopBtn");

  startBtn.onclick = ()=>{
    generate();
    startBtn.style.display="none";
    checkBtn.style.display="inline-block";
    hintBtn.style.display="inline-block";
    stopBtn.style.display="inline-block";
    el("aiText").textContent="🚀 Начинаем!";
  }

  checkBtn.onclick = ()=>{
    const val = el("answer").value.trim();
    if(val==="") return;
    const num = Number(val);
    data.total++;
    const correct = num===currentAnswer;
    if(correct){
      data.correct++; data.streak++; data.xp+=10;
      if(data.streak>data.bestStreak) data.bestStreak=data.streak;
      aiMood("correct");
      const msgs=["😄 Отлично!","🔥 Круто!","💪 Молодец!"];
      el("aiText").textContent = msgs[Math.floor(Math.random()*msgs.length)];
    } else {
      data.wrong++; data.streak=0; aiMood("wrong"); showHint();
      const msgs=["🤔 Попробуй ещё","💡 Подумай","😅 Почти!"];
      el("aiText").textContent = msgs[Math.floor(Math.random()*msgs.length)];
    }
    updateDifficulty(correct);
    checkLevel(); save(); updateUI();
    el("answer").value="";
    generate();
  }

  hintBtn.onclick = showHint;

  stopBtn.onclick = ()=>{
    checkBtn.style.display="none";
    hintBtn.style.display="none";
    stopBtn.style.display="none";
    startBtn.style.display="inline-block";
    el("task").textContent="Нажми старт";
    el("hint").textContent="";
    el("aiText").textContent="Остановились. Можно начать заново.";
  }

  updateUI();
});
</script>
