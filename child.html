<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренировка</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <div class="avatar" id="avatar">🤖</div>
  <h2>Тренировка устного счёта</h2>

  <div id="task">Нажми старт</div>
  <input type="number" id="answer" placeholder="Ваш ответ">
  <div id="hint"></div>

  <button id="startBtn">Старт</button>
  <button id="checkBtn" style="display:none;">Проверить</button>
  <button id="stopBtn" style="display:none;">Стоп</button>
  <button id="hintBtn" style="display:none;">Подсказка</button>

  <h3>Прогресс</h3>
  <div class="progress-bar"><div id="xpBar"></div></div>
  XP: <span id="xp">0</span> | Серия: <span id="streak">0</span> | Уровень: <span id="playerLevel">1</span>

  <h3>AI говорит</h3>
  <div id="aiText">Привет! Нажми старт, чтобы начать.</div>

  <h3>Достижения</h3>
  <div id="achievements"></div>

  <button onclick="resetProgress()">Сбросить прогресс</button>
  <br><br>
  <button onclick="location.href='index.html'">Назад</button>
</div>

<script src="script.js"></script>
<script>
// ===================
// Кнопки и подсказки
// ===================
const startBtn = document.getElementById("startBtn");
const checkBtn = document.getElementById("checkBtn");
const stopBtn = document.getElementById("stopBtn");
const hintBtn = document.getElementById("hintBtn");

startBtn.onclick = () => {
  generate();
  startBtn.style.display = "none";
  checkBtn.style.display = "block";
  stopBtn.style.display = "block";
  hintBtn.style.display = "block";
  el("aiText").textContent = "Удачи!";
}

checkBtn.onclick = () => {
  let val = el("answer").value.trim();
  if(val === "") return;
  let num = Number(val);

  data.total++;
  saveHistory();

  if(num === currentAnswer){
    data.correct++;
    data.streak++;
    data.xp += 10;
    aiMood("correct");
    if(data.streak > data.bestStreak) data.bestStreak = data.streak;
  } else {
    data.wrong++;
    data.streak = 0;
    aiMood("wrong");
    showHint();
  }

  checkLevel();
  checkAchievements();
  save();
  updateUI();
  el("answer").value = "";
  generate();
}

stopBtn.onclick = () => {
  checkBtn.style.display = "none";
  stopBtn.style.display = "none";
  hintBtn.style.display = "none";
  startBtn.style.display = "block";
  el("task").textContent = "Нажми старт";
  el("hint").textContent = "";
  el("aiText").textContent = "Нажми старт, чтобы начать.";
}

hintBtn.onclick = () => showHint();

function showHint(){
  if(!el("hint")) return;
  let hint="";
  let taskText=el("task").textContent;
  if(taskText.includes("-")){
    hint="Сравни числа и вычти меньшее из большего.";
  } else if(taskText.includes("+")){
    hint="Сложи числа по единицам, потом десятки.";
  }
  el("hint").textContent="💡 Подсказка: "+hint;
  el("aiText").textContent="Вот подсказка, попробуй использовать её!";
}
</script>
</body>
</html>
