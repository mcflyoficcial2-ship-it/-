<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренировка</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <div class="avatar" id="avatar">🤖</div>
  <h2>Тренировка устного счёта</h2>

  <div id="task">Нажми старт</div>
  <input type="number" id="answer" placeholder="Ваш ответ">
  <div id="hint"></div>

  <button id="startBtn">Старт</button>
  <button id="checkBtn" style="display:none;">Проверить</button>
  <button id="hintBtn" style="display:none;">Подсказка</button>
  <button id="stopBtn" style="display:none;">Стоп</button>

  <h3>Прогресс</h3>
  <div class="progress-bar"><div id="xpBar"></div></div>
  XP: <span id="xp">0</span> | Серия: <span id="streak">0</span> | Уровень: <span id="playerLevel">1</span>

  <h3>AI говорит</h3>
  <div id="aiText">Привет! Нажми старт, чтобы начать.</div>

  <h3>Достижения</h3>
  <div id="achievements"></div>

  <br><br>
  <button onclick="location.href='index.html'">Назад</button>
</div>

<script src="script.js"></script>
<script>
document.addEventListener("DOMContentLoaded", ()=>{
  const startBtn = document.getElementById("startBtn");
  const checkBtn = document.getElementById("checkBtn");
  const hintBtn = document.getElementById("hintBtn");
  const stopBtn = document.getElementById("stopBtn");

  startBtn.onclick = () => {
    generate(); 
    startBtn.style.display = "none";
    checkBtn.style.display = "inline-block";
    hintBtn.style.display = "inline-block";
    stopBtn.style.display = "inline-block";
    el("aiText").textContent = "🚀 Давай начнём!";
  }

  checkBtn.onclick = () => {
    let val = el("answer").value.trim();
    if(val === "") return;

    let num = Number(val);

    data.total++;
    saveHistory();

    let isCorrect = num === currentAnswer;

    if(isCorrect){
      data.correct++;
      data.streak++;
      data.xp += 10;

      if(data.streak > data.bestStreak) 
        data.bestStreak = data.streak;

      aiMood("correct");

      let good = [
        "😄 Отлично!",
        "🔥 Круто!",
        "💪 Так держать!",
        "👏 Молодец!"
      ];
      el("aiText").textContent = good[Math.floor(Math.random()*good.length)];

    } else {
      data.wrong++;
      data.streak = 0;

      aiMood("wrong");

      let bad = [
        "🤔 Попробуй ещё",
        "💡 Подумай",
        "😅 Почти!",
        "Не сдавайся!"
      ];
      el("aiText").textContent = bad[Math.floor(Math.random()*bad.length)];

      showHint();
    }

    // 🔥 АДАПТИВНАЯ СЛОЖНОСТЬ (главный фикс)
    if(typeof updateDifficulty === "function"){
      updateDifficulty(isCorrect);
    }

    checkLevel();
    checkAchievements();
    save();
    updateUI();

    el("answer").value = "";
    generate();
  }

  hintBtn.onclick = () => showHint();

  stopBtn.onclick = () => {
    checkBtn.style.display = "none";
    hintBtn.style.display = "none";
    stopBtn.style.display = "none";
    startBtn.style.display = "inline-block";

    el("task").textContent = "Нажми старт";
    el("hint").textContent = "";
    el("aiText").textContent = "Остановились. Можно начать заново.";
  }

  function showHint(){
    let taskText = el("task").textContent;
    let hint = "";

    if(taskText.includes("-")){
      hint="💡 Попробуй сначала округлить число, потом вычесть.";
    } 
    else if(taskText.includes("+")){
      hint="💡 Сложи сначала десятки, потом единицы.";
    }
    else if(taskText.includes("×")){
      hint="💡 Умножай по частям.";
    }
    else if(taskText.includes("÷")){
      hint="💡 Подумай, какое число умножить, чтобы получить это.";
    }

    el("hint").textContent = hint;
  }

});
</script>
</body>
</html>
