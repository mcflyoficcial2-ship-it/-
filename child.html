<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренировка</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <div class="avatar" id="avatar">🤖</div>
  <h2>Тренировка устного счёта</h2>

  <div id="task">Нажми старт</div>
  <input type="number" id="answer" placeholder="Ваш ответ">
  <div id="hint"></div>

  <button id="startBtn">Старт</button>
  <button id="checkBtn" style="display:none;">Проверить</button>
  <button id="hintBtn" style="display:none;">Подсказка</button>
  <button id="stopBtn" style="display:none;">Стоп</button>

  <h3>Прогресс</h3>
  <div class="progress-bar"><div id="xpBar"></div></div>
  XP: <span id="xp">0</span> | Серия: <span id="streak">0</span> | Уровень: <span id="playerLevel">1</span>

  <h3>AI говорит</h3>
  <div id="aiText">Привет! Нажми старт, чтобы начать.</div>

  <h3>Достижения</h3>
  <div id="achievements"></div>

  <br><br>
  <button onclick="location.href='index.html'">Назад</button>
</div>

<script src="script.js"></script>
<script>
document.addEventListener("DOMContentLoaded", ()=>{
  const startBtn = document.getElementById("startBtn");
  const checkBtn = document.getElementById("checkBtn");
  const hintBtn = document.getElementById("hintBtn");
  const stopBtn = document.getElementById("stopBtn");

  startBtn.onclick = () => {
    generate(); 
    startBtn.style.display = "none";
    checkBtn.style.display = "inline-block";
    hintBtn.style.display = "inline-block";
    stopBtn.style.display = "inline-block";
    el("aiText").textContent = "Давай начнём!";
  }

  checkBtn.onclick = () => {
    let val = el("answer").value.trim();
    if(val === "") return;
    let num = Number(val);

    data.total++;
    saveHistory();

    if(num === currentAnswer){
      data.correct++;
      data.streak++;
      data.xp += 10;
      aiMood("correct");
      if(data.streak > data.bestStreak) data.bestStreak = data.streak;
      el("aiText").textContent = "Ты молодец! Продолжай!";
    } else {
      data.wrong++;
      data.streak = 0;
      aiMood("wrong");
      showHint();
    }

    checkLevel();
    checkAchievements();
    save();
    updateUI();
    el("answer").value = "";
    generate();
  }

  hintBtn.onclick = () => showHint();

  stopBtn.onclick = () => {
    checkBtn.style.display = "none";
    hintBtn.style.display = "none";
    stopBtn.style.display = "none";
    startBtn.style.display = "inline-block";
    el("task").textContent = "Нажми старт";
    el("hint").textContent = "";
    el("aiText").textContent = "Нажми старт, чтобы начать.";
  }

  function showHint(){
    let hint = "";
    let taskText = el("task").textContent;
    if(taskText.includes("-")){
      hint="💡 Начни с того, чтобы определить, какое число больше, и вычти меньшее из большего.";
    } else if(taskText.includes("+")){
      hint="💡 Сложи сначала единицы, потом десятки, чтобы проще вычислить.";
    }
    el("hint").textContent = hint;
    el("aiText").textContent = "Используй подсказку и попробуй решить пример!";
  }
});
</script>
</body>
</html>
