<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Статистика</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="card">
  <h1>Статистика ребёнка</h1>

  <h3>Общая информация</h3>
  Всего задач: <span id="total">0</span><br>
  Правильно: <span id="correct">0</span><br>
  Неправильно: <span id="wrong">0</span><br>
  Точность: <span id="accuracy">0%</span><br>
  Лучшая серия: <span id="bestStreak">0</span><br>
  Уровень: <span id="playerLevel">1</span><br>
  XP: <span id="xp">0</span>

  <h3>Достижения</h3>
  <div id="achievements"></div>

  <h3>График прогресса</h3>
  <canvas id="progressChart"></canvas>

  <br><br>
  <button onclick="location.href='index.html'">Назад</button>
</div>

<script src="script.js"></script>
<script>
document.addEventListener("DOMContentLoaded", ()=>{
  updateUI();
  drawChart(); // рисуем диаграмму
});
</script>
</body>
</html>
