<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intellect Trainer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <div class="avatar" id="avatar">🤖</div>
  <h1>Intellect Trainer</h1>

  <button class="btn btn-child" id="btnChild">Я ребёнок</button>
  <button class="btn btn-parent" id="btnParent">Я родитель</button>
  <button class="btn btn-teacher" id="btnTeacher">Я учитель</button>
</div>

<script>
document.getElementById("btnChild").onclick = () => { location.href="child.html"; }
document.getElementById("btnParent").onclick = () => { location.href="stats.html"; }
document.getElementById("btnTeacher").onclick = () => { alert("Учительский режим пока в разработке."); }

let avatar = document.getElementById("avatar");
let moods = ["🤖","😄","🤔","🥳"];
setInterval(()=>{ avatar.textContent = moods[Math.floor(Math.random()*moods.length)]; },3000);
</script>

</body>
</html>
