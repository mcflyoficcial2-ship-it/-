<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intellect Trainer</title>
<link rel="stylesheet" href="style.css">
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #89f7fe, #66a6ff);
  margin:0; padding:0; display:flex; justify-content:center; align-items:center; height:100vh;
}

.card {
  background:white;
  border-radius:20px;
  padding:30px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  text-align:center;
  max-width:400px;
  width:90%;
  position:relative;
}

h1 {margin-bottom:20px; font-size:2rem; color:#333;}
.avatar {font-size:3rem; margin-bottom:15px; transition:all 0.3s;}
.btn {
  display:block; width:80%; margin:10px auto; padding:12px; border:none; border-radius:12px;
  font-size:1rem; color:white; cursor:pointer; transition:0.3s; text-decoration:none;
}
.btn-child {background: linear-gradient(90deg, #ff9a9e, #fad0c4);}
.btn-parent {background: linear-gradient(90deg, #a1c4fd, #c2e9fb);}
.btn-teacher {background: linear-gradient(90deg, #fbc2eb, #a6c1ee);}
.btn:hover {transform:scale(1.05);}

#hint {margin-top:10px; color:#ff9800; font-weight:500;}

</style>
</head>
<body>

<div class="card">
  <div class="avatar" id="avatar">🤖</div>
  <h1>Intellect Trainer</h1>

  <button class="btn btn-child" id="btnChild">Я ребёнок</button>
  <button class="btn btn-parent" id="btnParent">Я родитель</button>
  <button class="btn btn-teacher" id="btnTeacher">Я учитель</button>

</div>

<script>
// ===================
// BUTTON ACTIONS
// ===================
document.getElementById("btnChild").onclick = () => { location.href="child.html"; }
document.getElementById("btnParent").onclick = () => { location.href="stats.html"; }
document.getElementById("btnTeacher").onclick = () => { alert("Учительский режим пока в разработке."); }

// ===================
// AVATAR ANIMATION
// ===================
let avatar = document.getElementById("avatar");
let moods = ["🤖","😄","🤔","🥳"];
setInterval(()=>{
  let index = Math.floor(Math.random()*moods.length);
  avatar.textContent = moods[index];
},3000);
</script>

</body>
</html>
